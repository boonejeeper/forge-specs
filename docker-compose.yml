name: forgespecs

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: forgespecs
      POSTGRES_PASSWORD: forgespecs
      POSTGRES_DB: forgespecs
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgespecs -d forgespecs"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  # One-off schema migration. Runs `prisma migrate deploy` against postgres and
  # exits 0. App/collab/worker wait on `service_completed_successfully` so the
  # first `docker compose up` is the only command needed.
  migrate:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    command:
      ["sh", "-c", "cd /app/packages/db && pnpm exec prisma migrate deploy"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://forgespecs:forgespecs@postgres:5432/forgespecs?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      # Override hosts to the in-network service names.
      DATABASE_URL: postgresql://forgespecs:forgespecs@postgres:5432/forgespecs?schema=public
      REDIS_URL: redis://redis:6379
      # M12: expose the workspace repo to the in-container ingest flow as a
      # read-only mount under /repo. INGEST_LOCAL_ALLOWED_ROOTS is the allowlist
      # the path guard validates the user-supplied path against.
      INGEST_LOCAL_ALLOWED_ROOTS: /repo
    volumes:
      - ./:/repo:ro
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  collab:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://forgespecs:forgespecs@postgres:5432/forgespecs?schema=public
      REDIS_URL: redis://redis:6379
    ports:
      - "1234:1234"
    healthcheck:
      test:
        ["CMD-SHELL", "node -e \"fetch('http://localhost:1234/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  # Background worker — BullMQ consumer for async embedding (and future AI jobs).
  # Shares packages/db + packages/ai with web/collab. If REDIS_URL is unset the
  # worker exits cleanly (producers run inline), so this service is optional.
  worker:
    build:
      context: .
      dockerfile: apps/collab/Dockerfile
    restart: unless-stopped
    command: ["pnpm", "--filter", "@forgespecs/jobs", "worker"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://forgespecs:forgespecs@postgres:5432/forgespecs?schema=public
      REDIS_URL: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  postgres-data:
  redis-data:
