packages:
  - "packages/*"
  - "apps/*"
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: false
  prisma: true
  sharp: true
  vue-demi: false
minimumReleaseAgeExclude:
  - '@vitest/expect@4.1.9'
  - '@vitest/mocker@4.1.9'
  - '@vitest/pretty-format@4.1.9'
  - '@vitest/runner@4.1.9'
  - '@vitest/snapshot@4.1.9'
  - '@vitest/spy@4.1.9'
  - '@vitest/utils@4.1.9'
  - vitest@4.1.9
  - '@ai-sdk/gateway@3.0.132'
  - ai@6.0.206
  - '@ai-sdk/react@3.0.208'
